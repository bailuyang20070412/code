<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D汉诺塔互动学习游戏</title>
   </head>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑",sans-serif;
        }
        body{
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
        }
        h1{
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .control-box{
            background: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 10px #ccc;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        button{
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }
        .btn-set{
            background: #3498db;
            color: white;
        }
        .btn-auto{
            background: #27ae60;
            color: white;
        }
        .btn-reset{
            background: #e74c3c;
            color: white;
        }
        button:hover{
            opacity: 0.85;
        }
        .count-text{
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        /* 3D游戏舞台 */
        .game-wrap{
            perspective: 1200px;
        }
        .game-container{
            width: 700px;
            height: 320px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px #bbbbbb;
            transform-style: preserve-3d;
        }
        /* 柱子样式 */
        .peg{
            width: 22px;
            height: 240px;
            background: linear-gradient(90deg,#795548,#d7b99b,#795548);
            border-radius: 12px;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            cursor: pointer;
        }
        /* 圆盘样式 */
        .disk{
            height: 22px;
            border-radius: 12px;
            margin: 2px 0;
            box-shadow: 0 3px 6px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .disk.active{
            transform: translateY(-8px);
            box-shadow: 0 6px 15px #999;
        }
        /* 违规抖动动画 */
        @keyframes shake{
            0%,100%{transform: translateX(0);}
            25%{transform: translateX(-6px);}
            75%{transform: translateX(6px);}
        }
        .shake{
            animation: shake 0.4s ease;
        }
        /* 胜利发光动画 */
        @keyframes winLight{
            0%,100%{box-shadow: 0 0 12px #ffd700;}
            50%{box-shadow: 0 0 35px #ffc107;}
        }
        .win-box{
            animation: winLight 1s infinite;
        }
    </style>
</head>
<body>
    <h1>3D汉诺塔互动学习游戏</h1>
    <div class="control-box">
        <div>
            <span>圆盘数量：</span>
            <input type="number" id="diskNum" value="5" min="3" max="8">
            <button class="btn-set" onclick="setDiskCount()">确定设置</button>
        </div>
        <button class="btn-auto" onclick="startAutoSolve()">自动演示解题</button>
        <button class="btn-reset" onclick="resetGame()">重置游戏</button>
        <div class="count-text">移动步数：<span id="moveCount">0</span></div>
    </div>

    <div class="game-wrap">
        <div class="game-container" id="gameBox">
            <div class="peg" onclick="clickPeg(0)"></div>
            <div class="peg" onclick="clickPeg(1)"></div>
            <div class="peg" onclick="clickPeg(2)"></div>
        </div>
    </div>

    <script>
        // 游戏全局状态
        const gameState = {
            diskNum: 5,
            pegs: [[],[],[]],
            moveTotal: 0,
            isAutoRun: false,
            selectPeg: null
        };

        // 颜色数组
        const colorList = [
            '#e74c3c','#e67e22','#f1c40f','#2ecc71',
            '#1abc9c','#3498db','#9b59b6','#34495e'
        ];

        // 初始化游戏
        function initGame(){
            gameState.pegs = [[],[],[]];
            gameState.moveTotal = 0;
            gameState.selectPeg = null;
            gameState.isAutoRun = false;
            for(let i = gameState.diskNum; i >= 1; i--){
                gameState.pegs[0].push(i);
            }
            updateCount();
            renderGame();
        }

        // 渲染页面圆盘
        function renderGame(){
            const allPeg = document.querySelectorAll('.peg');
            allPeg.forEach((item,index)=>{
                item.innerHTML = '';
                gameState.pegs[index].forEach(size=>{
                    const disk = document.createElement('div');
                    disk.className = 'disk';
                    disk.style.width = (size * 25) + 'px';
                    disk.style.background = colorList[size-1];
                    item.appendChild(disk);
                })
            })
        }

        // 修改圆盘数量
        function setDiskCount(){
            let num = parseInt(document.getElementById('diskNum').value);
            if(num < 3 || num > 8){
                alert('请输入3-8之间的数字');
                return;
            }
            gameState.diskNum = num;
            initGame();
        }

        // 点击柱子逻辑
        function clickPeg(index){
            if(gameState.isAutoRun) return;
            if(gameState.selectPeg === null){
                // 选中柱子
                if(gameState.pegs[index].length === 0) return;
                gameState.selectPeg = index;
            }else{
                // 放置圆盘
                let from = gameState.selectPeg;
                let to = index;
                if(from === to){
                    gameState.selectPeg = null;
                    return;
                }
                if(checkMove(from,to)){
                    moveDisk(from,to);
                    gameState.moveTotal++;
                    updateCount();
                    checkWin();
                }else{
                    // 违规抖动
                    document.getElementById('gameBox').classList.add('shake');
                    setTimeout(()=>{
                        document.getElementById('gameBox').classList.remove('shake');
                    },400)
                    alert('规则错误！大盘不能放在小盘上方');
                }
                gameState.selectPeg = null;
            }
        }

        // 移动规则校验
        function checkMove(from,to){
            let fromArr = gameState.pegs[from];
            let toArr = gameState.pegs[to];
            if(fromArr.length === 0) return false;
            if(toArr.length === 0) return true;
            let topFrom = fromArr[fromArr.length - 1];
            let topTo = toArr[toArr.length - 1];
            return topFrom < topTo;
        }

        // 执行移动
        function moveDisk(from,to){
            let disk = gameState.pegs[from].pop();
            gameState.pegs[to].push(disk);
            renderGame();
        }

        // 更新步数
        function updateCount(){
            document.getElementById('moveCount').innerText = gameState.moveTotal;
        }

        // 胜利判定
        function checkWin(){
            if(gameState.pegs[2].length === gameState.diskNum){
                document.getElementById('gameBox').classList.add('win-box');
                setTimeout(()=>{
                    alert('恭喜闯关成功！顺利完成汉诺塔挑战');
                    document.getElementById('gameBox').classList.remove('win-box');
                },500)
            }
        }

        // 延迟函数
        function sleep(time){
            return new Promise(resolve=>setTimeout(resolve,time));
        }

        // 自动解题递归算法
        async function autoSolve(n,a,b,c){
            if(n === 0 || !gameState.isAutoRun) return;
            await autoSolve(n-1,a,c,b);
            await sleep(600);
            moveDisk(a,c);
            gameState.moveTotal++;
            updateCount();
            renderGame();
            await autoSolve(n-1,b,a,c);
        }

        // 开始自动演示
        async function startAutoSolve(){
            if(gameState.isAutoRun) return;
            resetGame();
            gameState.isAutoRun = true;
            await autoSolve(gameState.diskNum,0,1,2);
            gameState.isAutoRun = false;
            checkWin();
        }

        // 重置游戏
        function resetGame(){
            initGame();
        }

        // 页面加载初始化
        window.onload = initGame;
    </script>
</body>
</html>
